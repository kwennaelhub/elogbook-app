<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f6fff"/>
      <stop offset="100%" stop-color="#b667ac"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="bookShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>

  <!-- Livre ouvert -->
  <g filter="url(#bookShadow)">
    <path d="M120 340 C165 326, 220 322, 256 332 L256 160 C220 148, 165 152, 120 164Z" fill="white" opacity="0.95"/>
    <path d="M256 332 C292 322, 347 326, 392 340 L392 164 C347 152, 292 148, 256 160Z" fill="white" opacity="0.90"/>
  </g>

  <!-- Pli central -->
  <line x1="256" y1="160" x2="256" y2="332" stroke="#4f6fff" stroke-width="2" opacity="0.12"/>

  <!-- Lignes texte fantômes -->
  <rect x="148" y="195" width="80" height="4" rx="2" fill="#4f6fff" opacity="0.08"/>
  <rect x="148" y="212" width="64" height="4" rx="2" fill="#4f6fff" opacity="0.08"/>
  <rect x="148" y="229" width="72" height="4" rx="2" fill="#4f6fff" opacity="0.08"/>
  <rect x="280" y="195" width="76" height="4" rx="2" fill="#4f6fff" opacity="0.08"/>
  <rect x="280" y="212" width="60" height="4" rx="2" fill="#4f6fff" opacity="0.08"/>
  <rect x="280" y="229" width="68" height="4" rx="2" fill="#4f6fff" opacity="0.08"/>

  <!-- ECG -->
  <polyline points="108,268 180,268 200,268 218,268 230,268 238,280 244,230 252,310 260,244 266,272 274,268 300,268 340,268 404,268"
    stroke="#b667ac" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Point lumineux -->
  <circle cx="404" cy="268" r="5" fill="#b667ac" opacity="0.6"/>
  <circle cx="404" cy="268" r="3" fill="white" opacity="0.8"/>
</svg>

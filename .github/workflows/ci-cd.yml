name: CI/CD InternLog

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ─── Lint + Build ───
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://internlog.app
          NEXT_PUBLIC_APP_NAME: InternLog
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

  # ─── Tests E2E (sur PR uniquement) ───
  e2e:
    name: Tests E2E
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Installer Playwright
        run: npx playwright install chromium --with-deps

      - name: Lancer les tests E2E
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://internlog.app

      - name: Upload rapport Playwright
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── Deploy Production (push main uniquement) ───
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://internlog.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Installer Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull config Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build avec Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy sur Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed: $DEPLOY_URL"

      - name: Smoke test
        run: |
          sleep 10
          # /login est public (le middleware redirige les anonymes vers /login),
          # donc 200 attendu. L'ancien test sur / retournait 307 → faux négatif.
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://internlog.app/login)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed: HTTP $STATUS"
